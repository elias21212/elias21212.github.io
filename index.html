<script>

function presentation() {

let thema = document.getElementById("thema").value;

let slides = [
"Einführung",
"Ursachen",
"Auswirkungen",
"Beispiele",
"Lösungen",
"Fazit"
];

let output = "";

for (let i = 0; i < slides.length; i++) {

output += `
<div style="
border:1px solid #ccc;
padding:20px;
margin:20px;
border-radius:10px;
background:#f5f5f5;
">

<h3>Folie ${i+1}</h3>
<h2>${slides[i]}</h2>
<p>Thema: ${thema}</p>

</div>
`;

}

document.getElementById("ergebnis").innerHTML = output;

}

</script>
