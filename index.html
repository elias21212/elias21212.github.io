<script>

function presentation() {

let thema = document.getElementById("thema").value;

let slides = [
"Einführung",
"Ursachen",
"Auswirkungen",
"Beispiele",
"Lösungen",
"Fazit"
];

let output = "<h3>Präsentation: " + thema + "</h3>";

for (let i = 0; i < slides.length; i++) {
output += "<br><b>Folie " + (i+1) + ":</b> " + slides[i] + " – " + thema;
}

document.getElementById("ergebnis").innerHTML = output;

}

</script>
