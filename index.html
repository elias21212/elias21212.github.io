<script>
function rezept() {
  let zutaten = document.getElementById("zutaten").value.toLowerCase().trim();
  let ergebnis = document.getElementById("ergebnis");

  // Aufteilen in einzelne Wörter
  let zutatenListe = zutaten.split(/\s*,\s*|\s+/);

  if ((zutatenListe.includes("tomate") || zutatenListe.includes("tomaten")) && zutatenListe.includes("pasta")) {
    ergebnis.innerHTML = "Rezept: Pasta mit Tomatensauce 🍝";
  }
  else if (zutatenListe.includes("ei") && zutatenListe.includes("käse")) {
    ergebnis.innerHTML = "Rezept: Omelette mit Käse 🍳";
  }
  else if (zutatenListe.includes("brot") && zutatenListe.includes("käse")) {
    ergebnis.innerHTML = "Rezept: Käse-Sandwich 🥪";
  }
  else {
    ergebnis.innerHTML = "Leider habe ich noch kein Rezept dafür 😅";
  }
}
</script>
