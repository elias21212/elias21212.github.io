<script>
function rezept() {
let zutaten = document.getElementById("zutaten").value.toLowerCase();

if(zutaten.includes("tomate") || zutaten.includes("tomaten")){
if(zutaten.includes("pasta")){
document.getElementById("ergebnis").innerHTML =
"Rezept: Pasta mit Tomatensauce 🍝";
}
}

else if(zutaten.includes("ei") && zutaten.includes("käse")){
document.getElementById("ergebnis").innerHTML =
"Rezept: Omelette mit Käse 🍳";
}

else if(zutaten.includes("brot") && zutaten.includes("käse")){
document.getElementById("ergebnis").innerHTML =
"Rezept: Käse-Sandwich 🥪";
}

else{
document.getElementById("ergebnis").innerHTML =
"Leider habe ich noch kein Rezept dafür 😅";
}

}
</script>
