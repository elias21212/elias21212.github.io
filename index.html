<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>School Helper Präsentation</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f4f8;
    text-align: center;
    margin: 0;
    padding: 40px;
}

h1 {
    color: #333;
}

input {
    padding: 12px;
    width: 300px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 20px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #4a6cf7;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #3a55d9;
}

#ergebnis {
    margin-top: 40px;
}

.slide {
    background: white;
    padding: 20px;
    margin: 20px auto;
    max-width: 500px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: left;
}

.slide img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>School Helper Präsentation 📚</h1>
<p>Gib ein Thema ein, um automatisch eine Präsentation zu erstellen</p>

<input type="text" id="thema" placeholder="z.B. Klimawandel">
<br>
<button onclick="generatePresentation()">Präsentation erstellen</button>

<div id="ergebnis"></div>

<script>
function generatePresentation() {
    let thema = document.getElementById("thema").value.trim();
    if(thema === "") {
        alert("Bitte gib ein Thema ein!");
        return;
    }

    // Folienvorlagen
    let slides = [
        {title: "Einführung", text: `Kurze Einführung zum Thema ${thema}`, img: `https://source.unsplash.com/500x300/?${encodeURIComponent(thema)}`},
        {title: "Wichtige Fakten", text: `Wichtige Fakten über ${thema}`, img: `https://source.unsplash.com/500x300/?facts,${encodeURIComponent(thema)}`},
        {title: "Ursachen", text: `Die Ursachen von ${thema}`, img: `https://source.unsplash.com/500x300/?cause,${encodeURIComponent(thema)}`},
        {title: "Auswirkungen", text: `Auswirkungen von ${thema}`, img: `https://source.unsplash.com/500x300/?effect,${encodeURIComponent(thema)}`},
        {title: "Beispiele", text: `Beispiele zu ${thema}`, img: `https://source.unsplash.com/500x300/?example,${encodeURIComponent(thema)}`},
        {title: "Lösungen", text: `Mögliche Lösungen für ${thema}`, img: `https://source.unsplash.com/500x300/?solution,${encodeURIComponent(thema)}`},
        {title: "Fazit", text: `Zusammenfassung und Fazit zu ${thema}`, img: `https://source.unsplash.com/500x300/?summary,${encodeURIComponent(thema)}`}
    ];

    let output = "";
    slides.forEach((slide, i) => {
        output += `
        <div class="slide">
            <h3>Folie ${i+1}: ${slide.title}</h3>
            <p>${slide.text}</p>
            <img src="${slide.img}" alt="${slide.title}">
        </div>
        `;
    });

    document.getElementById("ergebnis").innerHTML = output;
}
</script>

</body>
</html>
